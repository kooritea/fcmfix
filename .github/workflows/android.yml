name: Android CI - Build APK

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]   # 可选：PR 时也构建，方便检查

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4   # 更新到最新版本

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 可选：动态生成 versionName（日期 + commit short hash）
    - name: Generate version name
      run: |
        SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
        VERSION_NAME=$(date +%Y%m%d)_${SHORT_SHA}
        echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV

    # 可选：如果你想保持原版从 build.gradle 读取 versionCode
    # - name: Extract versionCode from build.gradle
    #   run: |
    #     VERSION_CODE=$(grep -oP 'versionCode \K\d+' app/build.gradle | head -1)
    #     echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV

    # 可选：如果你希望 CI 自动改 versionName（常见做法）
    - name: Update versionName in build.gradle
      if: env.VERSION_NAME != ''
      run: |
        sed -i "s/versionName \".*\"/versionName \"${{ env.VERSION_NAME }}\"/" app/build.gradle

    - name: Build Release APK
      run: ./gradlew assembleRelease --stacktrace

    # 查找最新的 build-tools 版本（sign-android-release 需要）
    - name: Find latest build-tools version
      id: build-tools
      run: |
        BUILD_TOOL_VERSION=$(ls /usr/local/lib/android/sdk/build-tools/ | sort -V | tail -n 1)
        echo "BUILD_TOOL_VERSION=$BUILD_TOOL_VERSION" >> $GITHUB_ENV
        echo "Using build-tools: $BUILD_TOOL_VERSION"

    # 如果你有签名密钥（secrets），取消注释下面部分；否则注释掉，得到的是 unsigned APK
    # - name: Sign APK
    #   uses: r0adkll/sign-android-release@v1
    #   id: sign_app
    #   with:
    #     releaseDirectory: app/build/outputs/apk/release
    #     signingKeyBase64: ${{ secrets.SIGNINGKEYBASE64 }}
    #     alias: ${{ secrets.ALIAS }}
    #     keyStorePassword: ${{ secrets.KEYSTOREPASSWORD }}
    #     keyPassword: ${{ secrets.KEYPASSWORD }}
    #   env:
    #     BUILD_TOOLS_VERSION: ${{ env.BUILD_TOOL_VERSION }}

    # 重命名 APK（更友好）
    - name: Rename APK
      run: |
        APK_PATH=app/build/outputs/apk/release/app-release.apk
        if [ -f "$APK_PATH" ]; then
          mv "$APK_PATH" "fcmfix-${{ env.VERSION_NAME }}.apk"
        else
          # 如果没签名，就用 unsigned 的
          UNSIGNED_APK=app/build/outputs/apk/release/app-release-unsigned.apk
          if [ -f "$UNSIGNED_APK" ]; then
            mv "$UNSIGNED_APK" "fcmfix-${{ env.VERSION_NAME }}-unsigned.apk"
          fi
        fi

    # 上传 artifact → 在 Actions 页面可下载
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: fcmfix-apk
        path: fcmfix-*.apk
        if-no-files-found: error   # 有文件才成功
        retention-days: 14         # 保留 14 天，可改
